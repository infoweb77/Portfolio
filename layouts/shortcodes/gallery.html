{{ $layout := .Get "layout" | default "grid" }}
{{ $galleryId := .Get "id" | default "gallery" | md5 }}
{{ .Page.Scratch.Set "galleryId" $galleryId }}
{{ .Page.Scratch.Set "galleryIndex" 0 }}
{{ .Page.Store.Set "hasLightbox" true }}

<div class="gallery-{{ $layout }}" id="gallery-{{ $galleryId }}">
  {{ .Inner }}
</div>

<!-- Lightbox Modal -->
<div id="lightbox-modal" class="lightbox-modal" style="display:none;">
  <span class="close-btn" onclick="closeLightbox()">&times;</span>
  <button class="nav-btn prev-btn" onclick="navigateLightbox(-1)">&#10094;</button>
  <button class="nav-btn next-btn" onclick="navigateLightbox(1)">&#10095;</button>
  
  <div class="lightbox-container">
    <img class="lightbox-content" id="lightbox-img" src="" alt="">
    <div id="lightbox-counter" class="lightbox-counter"></div>
  </div>
</div>

<style>
/* ===== LAYOUTS ===== */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  padding: 16px 0;
}

.gallery-masonry {
  column-count: 3;
  column-gap: 16px;
  padding: 16px 0;
}

.gallery-masonry .gallery-item {
  break-inside: avoid;
  margin-bottom: 16px;
}

.gallery-flex {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 16px 0;
}

.gallery-flex .gallery-item {
  flex: 1 1 200px;
  max-width: 300px;
}

.gallery-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 16px 0;
}

.gallery-cards .gallery-item {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
}

.gallery-cards .gallery-item img {
  height: 200px;
}

/* ===== COMMON STYLES ===== */
.gallery-item {
  cursor: pointer;
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
}

.gallery-item:hover {
  transform: scale(1.03);
}

.gallery-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.gallery-item:hover img {
  transform: scale(1.05);
}

/* ===== LIGHTBOX ===== */
.lightbox-modal {
  display: none !important;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.92);
  align-items: center;
  justify-content: center;
}

.lightbox-modal.show {
  display: flex !important;
}

.lightbox-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 90%;
}

.lightbox-modal .close-btn {
  position: fixed;
  top: 20px;
  right: 40px;
  color: #fff;
  font-size: 40px;
  cursor: pointer;
  z-index: 10000;
  background: rgba(0,0,0,0.5);
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: transform 0.3s ease;
  border: none;
}

.lightbox-modal .close-btn:hover {
  transform: rotate(90deg);
  background: rgba(0,0,0,0.8);
}

.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 40px;
  cursor: pointer;
  z-index: 10000;
  background: rgba(0,0,0,0.5);
  border: none;
  padding: 20px 15px;
  border-radius: 8px;
  transition: background 0.3s ease;
}

.nav-btn:hover {
  background: rgba(0,0,0,0.8);
}

.prev-btn {
  left: 20px;
}

.next-btn {
  right: 20px;
}

.lightbox-modal .lightbox-content {
  max-width: 85vw;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 4px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

.lightbox-counter {
  color: rgba(255,255,255,0.8);
  margin-top: 16px;
  font-size: 1rem;
  text-align: center;
  padding: 6px 16px;
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
}

@media (max-width: 768px) {
  .gallery-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  
  .gallery-masonry {
    column-count: 2;
  }
  
  .gallery-item img {
    height: 150px;
  }
  
  .lightbox-modal .close-btn {
    top: 15px;
    right: 20px;
    font-size: 30px;
    width: 40px;
    height: 40px;
  }
  
  .nav-btn {
    font-size: 30px;
    padding: 12px 10px;
  }
  
  .prev-btn {
    left: 10px;
  }
  
  .next-btn {
    right: 10px;
  }
}
</style>

<script>
// Глобальное хранилище
window.galleryData = window.galleryData || {};

// Используем ID из параметра
const galleryId = '{{ $galleryId }}';

let currentGalleryId = null;
let currentIndex = 0;

function openLightbox(galleryId, index) {
  currentGalleryId = galleryId;
  currentIndex = index;
  
  const modal = document.getElementById('lightbox-modal');
  modal.classList.add('show');
  modal.style.display = 'flex !important';
  document.body.style.overflow = 'hidden';
  
  updateLightbox();
}

function closeLightbox() {
  const modal = document.getElementById('lightbox-modal');
  modal.classList.remove('show');
  modal.style.display = 'none !important';
  document.body.style.overflow = 'auto';
  currentGalleryId = null;
}

function navigateLightbox(direction) {
  if (!currentGalleryId) return;
  
  const images = window.galleryData[currentGalleryId];
  if (!images || images.length === 0) return;
  
  currentIndex = (currentIndex + direction + images.length) % images.length;
  updateLightbox();
}

function updateLightbox() {
  if (!currentGalleryId) return;
  
  const images = window.galleryData[currentGalleryId];
  if (!images || images.length === 0) return;
  
  const img = document.getElementById('lightbox-img');
  const counter = document.getElementById('lightbox-counter');
  const image = images[currentIndex];
  
  if (image) {
    img.src = image.src;
    counter.textContent = `${currentIndex + 1} / ${images.length}`;
  }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('lightbox-modal');
  if (modal.classList.contains('show')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigateLightbox(-1);
    if (e.key === 'ArrowRight') navigateLightbox(1);
  }
});

// Click outside image to close
document.addEventListener('DOMContentLoaded', function() {
  const modal = document.getElementById('lightbox-modal');
  if (modal) {
    modal.addEventListener('click', function(e) {
      if (e.target === this) {
        closeLightbox();
      }
    });
  }
});
</script>
